version: '3.9'

services:
  server:
    build:
      dockerfile: Dockerfile
      context: .
      target: dev
    volumes:
      - ./src:/usr/src/app/src
      - uploads:/usr/src/app/uploads
    environment:
      POSTGRES_HOST: database
      # POSTGRES_HOST: caboose.proxy.rlwy.net
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecommerce-platform
      # POSTGRES_PASSWORD: thBxChNccOkKtJjjTFzStchXZRDXbSjI
      # POSTGRES_DB: railway
      PORT: 80
      SESSION_SECRET: secret
      ADMIN_EMAIL: admin@test.local
      ADMIN_PASSWORD: test1234
      MAIL_HOST: "${MAIL_HOST:-smtp.gmail.com}"
      MAIL_PORT: "${MAIL_PORT:-587}"
      EMAIL_USER: "${EMAIL_USER}"
      EMAIL_PASS: "${EMAIL_PASS}"
      SUPABASE_URL: "${SUPABASE_URL}"
      SUPABASE_KEY: "${SUPABASE_KEY}"
      SUPABASE_BUCKET: "${SUPABASE_BUCKET:-uploads}"
      SESSION_DOMAIN: localhost
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID}"
      FIREBASE_SERVICE_ACCOUNT: "${FIREBASE_SERVICE_ACCOUNT}"
      FIREBASE_PROJECT_ID: "${FIREBASE_PROJECT_ID}"
      FIREBASE_CLIENT_EMAIL: "${FIREBASE_CLIENT_EMAIL}"
      APP_STORE_KEY_ID: "${APP_STORE_KEY_ID}"
      APP_STORE_ISSUER_ID: "${APP_STORE_ISSUER_ID}"
      APP_STORE_APP_ID: "${APP_STORE_APP_ID}"
      APP_STORE_PRIVATE_KEY: "${APP_STORE_PRIVATE_KEY}"
    command: npm run start:dev
    ports:
      - "80:80"
    networks:
      - default
    links:
      - database
      - redis
  database:
    image: postgres:14-alpine
    volumes:
      - postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecommerce-platform
    ports:
      - "5432:5432"
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: fonebahia8@gmail.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    volumes:
      - pgadmin:/var/lib/pgadmin
    ports:
      - "8080:80"
    links:
      - database

volumes:
  postgres:
  pgadmin:
  uploads:
