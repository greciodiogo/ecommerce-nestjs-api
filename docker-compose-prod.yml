version: '3.9'

services:
  server:
    build:
      dockerfile: Dockerfile
      context: .
      target: prod
    volumes:
      - uploads:/usr/src/app/uploads
    environment:
      POSTGRES_HOST: database
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: ecommerce-platform
      PORT: 80
      SESSION_SECRET: "${SESSION_SECRET}"
      SESSION_DOMAIN: ".encontrarshopping.com"
      NODE_ENV: "production"
      ADMIN_EMAIL: "${ADMIN_EMAIL}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD}"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: "${REDIS_PASSWORD:-}"
      GOOGLE_PLAY_SERVICE_ACCOUNT: "${GOOGLE_PLAY_SERVICE_ACCOUNT}"
      GOOGLE_PLAY_PACKAGE_NAME: "${GOOGLE_PLAY_PACKAGE_NAME}"
      APP_STORE_KEY_ID: "${APP_STORE_KEY_ID}"
      APP_STORE_ISSUER_ID: "${APP_STORE_ISSUER_ID}"
      APP_STORE_APP_ID: "${APP_STORE_APP_ID}"
      APP_STORE_PRIVATE_KEY: "${APP_STORE_PRIVATE_KEY}"
    command: npm run start:prod
    ports:
      - "80:80"
    networks:
      - default
    links:
      - database
      - redis
  database:
    image: postgres:14-alpine
    volumes:
      - postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: ecommerce-platform
  redis:
    image: redis:7-alpine

volumes:
  postgres:
  uploads:
